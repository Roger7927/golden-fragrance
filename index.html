<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLDEN FRAGRANCE | Elite Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a059;
            --gold-light: #f5d76e;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.02);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- BACKGROUND DE ELITE (ESTRELAS E BOLHAS) --- */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--d) infinite ease-in-out;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            background: radial-gradient(circle at 30% 30%, var(--gold-light), var(--gold));
            border-radius: 50%;
            opacity: 0.3;
            animation: rise var(--s) infinite linear;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.4); box-shadow: 0 0 10px #fff; }
        }

        @keyframes rise {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.3; }
            100% { transform: translateY(-125vh) rotate(360deg); opacity: 0; }
        }

        /* --- LAYOUT MODERNO --- */
        header { padding: 100px 20px; text-align: center; }
        
        h1 { 
            font-family: 'Cinzel', serif; 
            font-size: clamp(2rem, 8vw, 3.5rem);
            letter-spacing: 15px; 
            background: linear-gradient(to right, #fff, var(--gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .showcase {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px; padding: 40px 8%;
            max-width: 1600px; margin: 0 auto;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(197, 160, 89, 0.1);
            padding: 40px; text-align: center;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card:hover { 
            border-color: var(--gold); 
            transform: translateY(-20px); 
            background: rgba(197, 160, 89, 0.05);
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        .card img { width: 100%; height: 300px; object-fit: contain; margin-bottom: 30px; }
        
        h3 { font-family: 'Cinzel', serif; font-size: 1rem; letter-spacing: 2px; margin-bottom: 25px; min-height: 3rem; display: flex; align-items: center; justify-content: center;}

        .btn {
            display: inline-block;
            text-decoration: none;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 15px 35px;
            font-size: 0.7rem;
            letter-spacing: 4px;
            font-weight: 600;
            transition: 0.4s;
        }

        .btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 25px var(--gold); }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>

    <header>
        <h1>Golden Fragrance</h1>
        <p style="color: var(--gold); letter-spacing: 8px; font-size: 0.7rem; margin-top: 20px;">CURADORIA EXCLUSIVA DE LUXO</p>
    </header>

    <main class="showcase">
        <div class="card">
            <img src="img/jadore-lor.png" alt="Christian Dior">
            <h3>Christian Dior J'Adore L'Or Essence De Parfum</h3>
            <a href="https://amzn.to/4ceffa" target="_blank" class="btn">RESERVAR</a>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('bg-canvas');
        
        // Estrelas (Pontos luminosos)
        for(let i=0; i<60; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = star.style.height = Math.random() * 2 + 'px';
            star.style.setProperty('--d', Math.random() * 3 + 2 + 's');
            canvas.appendChild(star);
        }

        // Bolhas Flutuantes
        for(let i=0; i<15; i++) {
            let bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.style.left = Math.random() * 100 + '%';
            let size = Math.random() * 60 + 20 + 'px';
            bubble.style.width = bubble.style.height = size;
            bubble.style.setProperty('--s', Math.random() * 10 + 8 + 's');
            canvas.appendChild(bubble);
        }
    </script>
</body>
</html>
